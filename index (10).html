<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDLE LEGENDS - RPG 2D</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f0c040;
    --gold-dark: #c89a20;
    --purple: #7c3aed;
    --purple-dark: #4c1d95;
    --red: #ef4444;
    --blue: #3b82f6;
    --green: #22c55e;
    --bg-deep: #0a0612;
    --bg-mid: #110a1f;
    --bg-panel: #1a1030;
    --bg-card: #221540;
    --border: #3d2a6b;
    --text: #e2d9f3;
    --text-dim: #9b89c4;
    --shadow-gold: 0 0 20px rgba(240,192,64,0.4);
    --shadow-purple: 0 0 20px rgba(124,58,237,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(240,192,64,0.05) 0%, transparent 50%);
  }

  /* Stars bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.1) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.18) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.22) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ---- HEADER ---- */
  #header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 18px 20px 14px;
    border-bottom: 2px solid var(--border);
    background: linear-gradient(180deg, rgba(28,16,60,0.95) 0%, rgba(17,10,31,0.95) 100%);
    backdrop-filter: blur(10px);
  }

  #header h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(16px, 3vw, 26px);
    letter-spacing: 6px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(240,192,64,0.6), 0 0 60px rgba(240,192,64,0.3);
  }

  #header .subtitle {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text-dim);
    letter-spacing: 3px;
    margin-top: 4px;
  }

  /* ---- RESOURCES BAR ---- */
  #resources {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 12px;
    padding: 10px 16px;
    background: rgba(17,10,31,0.9);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    justify-content: center;
  }

  .res-item {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
  }

  .res-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .res-icon.gold { background: radial-gradient(circle, #ffe066 30%, #c89a20 100%); box-shadow: 0 0 8px rgba(240,192,64,0.6); }
  .res-icon.gem { background: radial-gradient(circle, #c084fc 30%, #7c3aed 100%); box-shadow: 0 0 8px rgba(124,58,237,0.6); }
  .res-icon.wave-ico { background: radial-gradient(circle, #f87171 30%, #b91c1c 100%); box-shadow: 0 0 8px rgba(239,68,68,0.6); }

  .res-item .label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text-dim);
  }

  .res-item .value {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--gold);
    min-width: 60px;
  }

  .res-item .value.gem-val { color: #c084fc; }
  .res-item .value.wave-val { color: #f87171; }

  /* ---- MAIN LAYOUT ---- */
  #main {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: 260px 1fr 280px;
    gap: 14px;
    padding: 14px;
    max-width: 1300px;
    margin: 0 auto;
    min-height: calc(100vh - 120px);
  }

  /* ---- PANEL BASE ---- */
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--gold);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(240,192,64,0.05);
    text-transform: uppercase;
  }

  /* ---- HERO PANEL ---- */
  #hero-panel {
    grid-column: 1;
  }

  .hero-visual {
    position: relative;
    height: 160px;
    background: linear-gradient(180deg, rgba(76,29,149,0.3) 0%, rgba(10,6,18,0.8) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-visual::before {
    content: '';
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 80px; height: 30px;
    background: radial-gradient(ellipse, rgba(124,58,237,0.4) 0%, transparent 70%);
  }

  /* Pixel Hero */
  .pixel-hero {
    position: relative;
    display: grid;
    grid-template-areas:
      ". head ."
      "body body body"
      ". legs .";
    gap: 0;
    image-rendering: pixelated;
    animation: hero-idle 1.2s steps(2) infinite;
    filter: drop-shadow(0 0 12px rgba(124,58,237,0.8));
  }

  @keyframes hero-idle {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-4px); }
  }

  .pixel-hero.attacking {
    animation: hero-attack 0.3s steps(2) 2;
  }

  @keyframes hero-attack {
    0% { transform: translateX(0) scaleX(1); }
    50% { transform: translateX(20px) scaleX(1.1); }
    100% { transform: translateX(0) scaleX(1); }
  }

  .ph-head {
    width: 28px; height: 28px;
    background: #f5d6a0;
    border: 2px solid #8b4513;
    position: relative;
    margin: 0 auto;
    box-shadow: inset -4px -4px 0 rgba(0,0,0,0.3);
  }

  .ph-head::before {
    content: '';
    position: absolute;
    top: -10px; left: -4px;
    width: 34px; height: 12px;
    background: #7c3aed;
    border: 2px solid #4c1d95;
  }

  .ph-head::after {
    content: '';
    position: absolute;
    top: 6px; left: 4px;
    width: 6px; height: 6px;
    background: #1e3a8a;
    box-shadow: 10px 0 0 #1e3a8a;
  }

  .ph-body {
    width: 40px; height: 32px;
    background: #7c3aed;
    border: 2px solid #4c1d95;
    margin: 0 auto;
    position: relative;
    box-shadow: inset -6px -6px 0 rgba(0,0,0,0.3);
  }

  .ph-body::before {
    content: '';
    position: absolute;
    top: 6px; left: -10px;
    width: 10px; height: 20px;
    background: #7c3aed;
    border: 2px solid #4c1d95;
    box-shadow: inset -3px -3px 0 rgba(0,0,0,0.3);
  }

  .ph-body::after {
    content: '';
    position: absolute;
    top: 6px; right: -10px;
    width: 10px; height: 20px;
    background: #7c3aed;
    border: 2px solid #4c1d95;
    box-shadow: inset -3px -3px 0 rgba(0,0,0,0.3);
  }

  .ph-legs {
    width: 36px; height: 20px;
    display: flex;
    gap: 4px;
    margin: 0 auto;
  }

  .ph-leg {
    flex: 1;
    background: #4c1d95;
    border: 2px solid #2e1065;
    box-shadow: inset -2px -2px 0 rgba(0,0,0,0.4);
  }

  .ph-sword {
    position: absolute;
    right: -30px; top: 50%;
    transform: translateY(-50%) rotate(-30deg);
    width: 6px; height: 36px;
    background: linear-gradient(180deg, #e2e8f0 0%, #94a3b8 50%, #c89a20 100%);
    border: 1px solid #475569;
  }

  .ph-sword::before {
    content: '';
    position: absolute;
    top: -6px; left: -3px;
    width: 12px; height: 6px;
    background: #c89a20;
    border: 1px solid #92400e;
  }

  /* Hero stats */
  .hero-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--gold);
    text-align: center;
    padding: 10px 14px 4px;
  }

  .hero-class {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--purple);
    text-align: center;
    margin-bottom: 8px;
    color: #c084fc;
  }

  .stat-bar-row {
    padding: 4px 14px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-bar-label {
    display: flex;
    justify-content: space-between;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .stat-bar-label span:last-child { color: var(--text); }

  .bar-track {
    height: 8px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .bar-fill.hp { background: linear-gradient(90deg, #16a34a, #22c55e); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
  .bar-fill.mp { background: linear-gradient(90deg, #1d4ed8, #3b82f6); box-shadow: 0 0 6px rgba(59,130,246,0.5); }
  .bar-fill.xp { background: linear-gradient(90deg, #92400e, #f0c040); box-shadow: 0 0 6px rgba(240,192,64,0.5); }

  .hero-stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    margin-top: 6px;
  }

  .stat-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px;
    text-align: center;
  }

  .stat-box .stat-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: var(--text-dim);
    margin-bottom: 3px;
  }

  .stat-box .stat-val {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--gold);
  }

  /* Level badge */
  .level-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 6px 14px;
  }

  .lv-num {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #fff;
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    border: 2px solid var(--gold);
    border-radius: 4px;
    padding: 4px 8px;
    box-shadow: var(--shadow-gold);
  }

  /* ---- BATTLE ARENA ---- */
  #arena-panel {
    grid-column: 2;
    min-height: 500px;
  }

  #battle-arena {
    position: relative;
    flex: 1;
    min-height: 340px;
    background:
      linear-gradient(180deg,
        rgba(10,6,18,0) 0%,
        rgba(10,6,18,0) 60%,
        rgba(10,6,18,0.8) 100%
      );
    overflow: hidden;
  }

  /* Background layers */
  .arena-bg {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg,
        #0d0820 0%,
        #1a0f35 40%,
        #2d1b5e 60%,
        #1a0f35 70%,
        #0a0612 100%
      );
  }

  .arena-moon {
    position: absolute;
    top: 16px; right: 40px;
    width: 50px; height: 50px;
    background: radial-gradient(circle, #fef9c3 0%, #fde047 40%, #ca8a04 100%);
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(253,224,71,0.5), 0 0 60px rgba(253,224,71,0.2);
  }

  .arena-mountains {
    position: absolute;
    bottom: 70px; left: 0; right: 0;
    height: 80px;
  }

  .arena-mountains svg {
    width: 100%; height: 100%;
    fill: #0f0820;
  }

  .arena-ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 70px;
    background: linear-gradient(180deg, #1a0f35 0%, #0d0820 100%);
    border-top: 2px solid #2d1b5e;
  }

  .arena-ground::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(124,58,237,0.5), transparent);
    box-shadow: 0 0 10px rgba(124,58,237,0.3);
  }

  /* Battle entities */
  .battle-entities {
    position: absolute;
    bottom: 70px;
    left: 0; right: 0;
    height: 120px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 40px;
  }

  /* Enemy pixel art */
  .pixel-enemy {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: enemy-idle 1.5s steps(2) infinite;
    filter: drop-shadow(0 0 10px rgba(239,68,68,0.6));
    cursor: default;
  }

  @keyframes enemy-idle {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .pixel-enemy.dead {
    animation: enemy-die 0.5s ease forwards;
  }

  @keyframes enemy-die {
    0% { transform: scale(1) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.3) rotate(15deg); opacity: 0.5; }
    100% { transform: scale(0) rotate(45deg); opacity: 0; }
  }

  .pixel-enemy.taking-hit {
    animation: enemy-hit 0.3s steps(2);
    filter: drop-shadow(0 0 15px rgba(239,68,68,1)) brightness(2);
  }

  @keyframes enemy-hit {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* Slime enemy */
  .slime-body {
    width: 40px; height: 28px;
    background: radial-gradient(ellipse at 40% 40%, #86efac 0%, #16a34a 60%, #14532d 100%);
    border-radius: 50% 50% 40% 40%;
    border: 2px solid #14532d;
    position: relative;
    box-shadow: inset -6px -6px 0 rgba(0,0,0,0.3);
  }

  .slime-body::before {
    content: '';
    position: absolute;
    top: 6px; left: 6px;
    width: 6px; height: 8px;
    background: #14532d;
    border-radius: 50%;
    box-shadow: 14px 0 0 #14532d;
  }

  .slime-body::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 6px;
    width: 8px; height: 6px;
    background: #16a34a;
    border-radius: 0 0 50% 50%;
    box-shadow: 16px 0 0 #16a34a;
    border: 1px solid #14532d;
  }

  /* Orc enemy */
  .orc-head {
    width: 32px; height: 28px;
    background: radial-gradient(circle at 40% 40%, #86efac 0%, #4ade80 50%, #16a34a 100%);
    border: 2px solid #14532d;
    position: relative;
    box-shadow: inset -4px -4px 0 rgba(0,0,0,0.3);
  }

  .orc-head::before {
    content: '';
    position: absolute;
    top: -8px; left: -2px;
    width: 34px; height: 10px;
    background: #713f12;
    border: 2px solid #92400e;
    border-radius: 2px;
  }

  .orc-head::after {
    content: '';
    position: absolute;
    top: 8px; left: 4px;
    width: 6px; height: 6px;
    background: #dc2626;
    border-radius: 50%;
    box-shadow: 12px 0 0 #dc2626;
  }

  .orc-body {
    width: 44px; height: 30px;
    background: linear-gradient(180deg, #6b7280 0%, #374151 100%);
    border: 2px solid #1f2937;
    position: relative;
    box-shadow: inset -6px -6px 0 rgba(0,0,0,0.4);
  }

  /* Dragon boss */
  .dragon-head {
    width: 50px; height: 40px;
    background: radial-gradient(circle at 40% 40%, #f87171 0%, #dc2626 50%, #7f1d1d 100%);
    border: 2px solid #7f1d1d;
    border-radius: 4px 20px 4px 4px;
    position: relative;
    box-shadow: inset -8px -8px 0 rgba(0,0,0,0.4);
  }

  .dragon-head::before {
    content: '';
    position: absolute;
    top: -12px; right: -4px;
    width: 14px; height: 14px;
    background: #dc2626;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    border: 1px solid #7f1d1d;
  }

  .dragon-head::after {
    content: '';
    position: absolute;
    top: 10px; left: 8px;
    width: 8px; height: 8px;
    background: #fbbf24;
    border-radius: 50%;
    box-shadow: 0 0 8px #f59e0b, 16px 0 0 #fbbf24, 16px 0 8px #f59e0b;
  }

  .dragon-body {
    width: 60px; height: 40px;
    background: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%);
    border: 2px solid #7f1d1d;
    clip-path: polygon(0% 0%, 100% 10%, 100% 100%, 0% 100%);
    box-shadow: inset -8px -8px 0 rgba(0,0,0,0.4);
  }

  /* HP bar above enemy */
  .enemy-hp-bar {
    position: absolute;
    top: -28px;
    left: 50%; transform: translateX(-50%);
    width: 70px;
  }

  .enemy-hp-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: #f87171;
    text-align: center;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80px;
  }

  .enemy-hp-track {
    height: 6px;
    background: rgba(0,0,0,0.6);
    border: 1px solid #7f1d1d;
    border-radius: 2px;
    overflow: hidden;
  }

  .enemy-hp-fill {
    height: 100%;
    background: linear-gradient(90deg, #dc2626, #ef4444);
    box-shadow: 0 0 4px rgba(239,68,68,0.8);
    transition: width 0.4s ease;
  }

  /* Damage number */
  .dmg-num {
    position: absolute;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    font-weight: bold;
    color: #fbbf24;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.8), 0 0 10px rgba(251,191,36,0.8);
    pointer-events: none;
    z-index: 100;
    animation: float-up 1.2s ease forwards;
  }

  .dmg-num.crit { color: #f87171; font-size: 16px; text-shadow: 2px 2px 0 rgba(0,0,0,0.8), 0 0 15px rgba(239,68,68,0.9); }
  .dmg-num.heal { color: #4ade80; }
  .dmg-num.enemy-dmg { color: #f87171; left: 30% !important; }

  @keyframes float-up {
    0% { transform: translateY(0) scale(0.5); opacity: 1; }
    20% { transform: translateY(-20px) scale(1.2); opacity: 1; }
    100% { transform: translateY(-60px) scale(0.8); opacity: 0; }
  }

  /* Battle log */
  #battle-log {
    border-top: 1px solid var(--border);
    padding: 8px;
    height: 110px;
    overflow-y: auto;
    background: rgba(0,0,0,0.3);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .log-entry {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    line-height: 1.8;
    color: var(--text-dim);
    padding: 1px 0;
  }

  .log-entry.attack { color: #fbbf24; }
  .log-entry.crit { color: #f87171; }
  .log-entry.heal { color: #4ade80; }
  .log-entry.level { color: #c084fc; }
  .log-entry.wave { color: #60a5fa; }
  .log-entry.kill { color: #fbbf24; }

  /* Wave info */
  .wave-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .wave-title {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
  }

  .enemy-count {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text-dim);
  }

  .speed-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--gold);
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .speed-btn:hover {
    background: var(--purple-dark);
    border-color: var(--purple);
  }

  .speed-btn.active {
    background: var(--purple);
    border-color: #c084fc;
    box-shadow: var(--shadow-purple);
  }

  /* ---- UPGRADE PANEL ---- */
  #upgrade-panel {
    grid-column: 3;
    overflow-y: auto;
    max-height: calc(100vh - 130px);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .upgrade-card {
    margin: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: all 0.2s;
  }

  .upgrade-card:hover {
    border-color: var(--gold-dark);
    box-shadow: 0 0 12px rgba(240,192,64,0.15);
  }

  .upgrade-card.maxed {
    border-color: #7c3aed;
    background: rgba(124,58,237,0.1);
  }

  .upgrade-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }

  .upgrade-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .upgrade-icon svg { width: 14px; height: 14px; }

  .upgrade-name {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }

  .upgrade-level-badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--gold);
    background: rgba(240,192,64,0.1);
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 3px;
    padding: 2px 5px;
  }

  .upgrade-body {
    padding: 8px 10px;
  }

  .upgrade-desc {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .upgrade-current {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #c084fc;
    margin-bottom: 8px;
  }

  .upgrade-progress {
    height: 4px;
    background: rgba(0,0,0,0.4);
    border-radius: 2px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .upgrade-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), #c084fc);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .upgrade-btn {
    width: 100%;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 700;
    padding: 7px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .upgrade-btn:not(:disabled) {
    background: linear-gradient(135deg, #92400e, #c89a20, #92400e);
    background-size: 200% 100%;
    background-position: 100% 0;
    color: #fff;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
    box-shadow: 0 2px 8px rgba(240,192,64,0.3);
  }

  .upgrade-btn:not(:disabled):hover {
    background-position: 0% 0;
    box-shadow: 0 4px 16px rgba(240,192,64,0.5);
    transform: translateY(-1px);
  }

  .upgrade-btn:not(:disabled):active {
    transform: translateY(1px);
  }

  .upgrade-btn:disabled {
    background: rgba(255,255,255,0.05);
    color: var(--text-dim);
    cursor: not-allowed;
    border: 1px solid var(--border);
  }

  .upgrade-cost {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    margin-top: 2px;
    color: var(--gold);
  }

  .upgrade-cost.gem-cost { color: #c084fc; }

  /* Tabs for upgrade panel */
  .upgrade-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    padding: 8px 4px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
    background: rgba(240,192,64,0.05);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Skills */
  .skill-card {
    margin: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .skill-card:hover {
    border-color: var(--purple);
    box-shadow: var(--shadow-purple);
  }

  .skill-card.unlocked {
    border-color: #7c3aed;
    background: rgba(124,58,237,0.1);
  }

  .skill-icon {
    width: 40px; height: 40px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .skill-icon svg { width: 20px; height: 20px; }

  .skill-info { flex: 1; }

  .skill-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }

  .skill-desc {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.3;
  }

  .skill-cost {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #c084fc;
    margin-top: 4px;
  }

  /* Prestige */
  .prestige-panel {
    margin: 8px;
    background: linear-gradient(135deg, rgba(124,58,237,0.2) 0%, rgba(76,29,149,0.3) 100%);
    border: 1px solid var(--purple);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }

  .prestige-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 900;
    color: var(--gold);
    text-shadow: var(--shadow-gold);
    margin-bottom: 6px;
  }

  .prestige-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .prestige-bonus {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #c084fc;
    margin-bottom: 10px;
  }

  .prestige-btn {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    padding: 10px 20px;
    border: 2px solid var(--gold);
    background: linear-gradient(135deg, rgba(124,58,237,0.4), rgba(76,29,149,0.6));
    color: var(--gold);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
    width: 100%;
    text-shadow: 0 0 10px rgba(240,192,64,0.5);
    box-shadow: var(--shadow-gold);
  }

  .prestige-btn:hover {
    background: linear-gradient(135deg, rgba(124,58,237,0.7), rgba(76,29,149,0.9));
    transform: scale(1.02);
    box-shadow: 0 0 30px rgba(240,192,64,0.5);
  }

  .prestige-btn:disabled {
    border-color: var(--border);
    color: var(--text-dim);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
    text-shadow: none;
    background: rgba(255,255,255,0.03);
  }

  /* Notification */
  #notification {
    position: fixed;
    top: 20px; right: 20px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--purple-dark), var(--purple));
    border: 1px solid var(--gold);
    color: var(--gold);
    z-index: 9999;
    transform: translateX(200px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: var(--shadow-gold);
  }

  #notification.show {
    transform: translateX(0);
    opacity: 1;
  }

  /* Particle effects */
  .particle {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    animation: particle-fly 0.8s ease forwards;
  }

  @keyframes particle-fly {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* Responsive */
  @media (max-width: 1000px) {
    #main { grid-template-columns: 1fr 1fr; }
    #hero-panel { grid-column: 1; }
    #arena-panel { grid-column: 2; }
    #upgrade-panel { grid-column: 1 / -1; max-height: 400px; }
  }

  @media (max-width: 640px) {
    #main { grid-template-columns: 1fr; gap: 10px; padding: 10px; }
    #hero-panel { grid-column: 1; }
    #arena-panel { grid-column: 1; }
    #upgrade-panel { grid-column: 1; }
  }

  /* Idle indicator */
  .idle-indicator {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #4ade80;
    text-align: center;
    padding: 4px;
    background: rgba(34,197,94,0.1);
    border-bottom: 1px solid rgba(34,197,94,0.2);
    animation: pulse-idle 2s ease-in-out infinite;
  }

  @keyframes pulse-idle {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  /* Special effects */
  .glitch {
    animation: glitch-text 3s linear infinite;
  }

  @keyframes glitch-text {
    0%, 95%, 100% { text-shadow: 0 0 30px rgba(240,192,64,0.6), 0 0 60px rgba(240,192,64,0.3); }
    96% { text-shadow: -2px 0 #f87171, 2px 0 #60a5fa, 0 0 30px rgba(240,192,64,0.6); }
    97% { text-shadow: 2px 0 #f87171, -2px 0 #60a5fa, 0 0 30px rgba(240,192,64,0.6); }
    98% { text-shadow: 0 0 30px rgba(240,192,64,0.6); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="notification"></div>

<div id="header">
  <h1 class="glitch">IDLE LEGENDS</h1>
  <div class="subtitle">AUTO RPG ADVENTURE</div>
</div>

<div id="resources">
  <div class="res-item">
    <div class="res-icon gold"></div>
    <span class="label">GOLD</span>
    <span class="value" id="gold-display">0</span>
  </div>
  <div class="res-item">
    <div class="res-icon gem"></div>
    <span class="label">GEM</span>
    <span class="value gem-val" id="gem-display">0</span>
  </div>
  <div class="res-item">
    <div class="res-icon wave-ico"></div>
    <span class="label">WAVE</span>
    <span class="value wave-val" id="wave-display">1</span>
  </div>
  <div class="res-item">
    <div class="res-icon" style="background: radial-gradient(circle, #60a5fa 30%, #1d4ed8 100%); box-shadow: 0 0 8px rgba(59,130,246,0.6);"></div>
    <span class="label">PRESTIGE</span>
    <span class="value" id="prestige-display" style="color:#60a5fa;">0</span>
  </div>
</div>

<div id="main">
  <!-- Hero Panel -->
  <div class="panel" id="hero-panel">
    <div class="panel-title">Hero</div>

    <div class="hero-visual">
      <div class="pixel-hero" id="pixel-hero">
        <div class="ph-head"></div>
        <div class="ph-body">
          <div class="ph-sword"></div>
        </div>
        <div class="ph-legs">
          <div class="ph-leg"></div>
          <div class="ph-leg"></div>
        </div>
      </div>
    </div>

    <div class="hero-name" id="hero-name">AETHER</div>
    <div class="hero-class" id="hero-class">WANDERER</div>

    <div class="level-badge">
      <div class="lv-num" id="hero-level">LV.1</div>
    </div>

    <div class="stat-bar-row">
      <div class="stat-bar-label">
        <span>HP</span>
        <span id="hp-text">100/100</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill hp" id="hp-bar" style="width:100%"></div>
      </div>
    </div>
    <div class="stat-bar-row">
      <div class="stat-bar-label">
        <span>MP</span>
        <span id="mp-text">50/50</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill mp" id="mp-bar" style="width:100%"></div>
      </div>
    </div>
    <div class="stat-bar-row">
      <div class="stat-bar-label">
        <span>EXP</span>
        <span id="exp-text">0/100</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill xp" id="exp-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="hero-stats-grid">
      <div class="stat-box">
        <div class="stat-name">ATK</div>
        <div class="stat-val" id="stat-atk">10</div>
      </div>
      <div class="stat-box">
        <div class="stat-name">DEF</div>
        <div class="stat-val" id="stat-def">5</div>
      </div>
      <div class="stat-box">
        <div class="stat-name">SPD</div>
        <div class="stat-val" id="stat-spd">1.0</div>
      </div>
      <div class="stat-box">
        <div class="stat-name">CRIT</div>
        <div class="stat-val" id="stat-crit">5%</div>
      </div>
    </div>
  </div>

  <!-- Arena -->
  <div class="panel" id="arena-panel">
    <div class="idle-indicator" id="idle-status">AUTO BATTLE ACTIVE - IDLE MODE ON</div>
    <div class="wave-info">
      <div class="wave-title" id="wave-title">Wave 1 - Forest Slimes</div>
      <div class="enemy-count" id="enemy-count">Enemies: 3/3</div>
      <div style="display:flex;gap:6px;">
        <button class="speed-btn active" id="speed-1x" onclick="setSpeed(1)">1x</button>
        <button class="speed-btn" id="speed-2x" onclick="setSpeed(2)">2x</button>
        <button class="speed-btn" id="speed-4x" onclick="setSpeed(4)">4x</button>
      </div>
    </div>

    <div id="battle-arena">
      <div class="arena-bg"></div>
      <div class="arena-moon"></div>
      <div class="arena-mountains">
        <svg viewBox="0 0 800 80" preserveAspectRatio="none">
          <polygon points="0,80 80,20 160,60 240,10 320,50 400,5 480,45 560,15 640,55 720,25 800,60 800,80" />
        </svg>
      </div>
      <div class="arena-ground"></div>
      <div class="battle-entities" id="battle-entities">
        <!-- filled by JS -->
      </div>
    </div>

    <div id="battle-log">
      <div class="log-entry wave">[SYSTEM] Welcome to IDLE LEGENDS! Auto-battle has begun.</div>
    </div>
  </div>

  <!-- Upgrade Panel -->
  <div class="panel" id="upgrade-panel">
    <div class="panel-title">Upgrade</div>
    <div class="upgrade-tabs">
      <button class="tab-btn active" onclick="switchTab('stats')">STATS</button>
      <button class="tab-btn" onclick="switchTab('skills')">SKILLS</button>
      <button class="tab-btn" onclick="switchTab('prestige')">PRESTIGE</button>
    </div>

    <div class="tab-content active" id="tab-stats">
      <!-- Upgrades rendered by JS -->
    </div>

    <div class="tab-content" id="tab-skills">
      <!-- Skills rendered by JS -->
    </div>

    <div class="tab-content" id="tab-prestige">
      <!-- Prestige rendered by JS -->
    </div>
  </div>
</div>

<script>
// ===== GAME STATE =====
const G = {
  gold: 0,
  gems: 0,
  wave: 1,
  prestigeCount: 0,
  prestigeBonus: 1,
  gameSpeed: 1,

  hero: {
    name: 'Arno',
    level: 1,
    hp: 100, maxHp: 100,
    mp: 50, maxMp: 50,
    atk: 10, def: 5,
    speed: 1.0, crit: 5,
    exp: 0, expNeeded: 100,
    alive: true,
    respawnTimer: 0,
  },

  upgrades: [
    { id:'atk', name:'Sword Mastery', desc:'Increase attack power', stat:'atk', base:10, inc:8, cost:10, costMult:1.6, level:0, max:50, color:'#ef4444', icon:'sword' },
    { id:'def', name:'Iron Skin', desc:'Increase defense points', stat:'def', base:5, inc:4, cost:10, costMult:1.5, level:0, max:50, color:'#3b82f6', icon:'shield' },
    { id:'hp', name:'Vitality', desc:'Increase max HP', stat:'maxHp', base:100, inc:50, cost:10, costMult:1.55, level:0, max:50, color:'#22c55e', icon:'heart' },
    { id:'mp', name:'Arcane Pool', desc:'Increase max MP', stat:'maxMp', base:50, inc:20, cost:10, costMult:1.4, level:0, max:50, color:'#60a5fa', icon:'droplet' },
    { id:'spd', name:'Swift Steps', desc:'Increase attack speed (DPS)', stat:'speed', base:1.0, inc:0.15, cost:80, costMult:1.7, level:0, max:30, color:'#fbbf24', icon:'zap' },
    { id:'crit', name:'Eagle Eye', desc:'Increase critical chance', stat:'crit', base:5, inc:3, cost:10, costMult:1.65, level:0, max:30, color:'#f87171', icon:'target' },
    { id:'gold', name:'Merchant Luck', desc:'Increase gold drop from enemies', stat:'goldMult', base:1, inc:0.3, cost:5, costMult:1.5, level:0, max:40, color:'#f0c040', icon:'coins', extra:true },
    { id:'regen', name:'Life Regen', desc:'Auto-recover HP each second', stat:'regen', base:0, inc:2, cost:10, costMult:1.6, level:0, max:30, color:'#4ade80', icon:'plus', extra:true },
  ],

  skills: [
    { id:'berserker', name:'Berserker Rage', desc:'+30% ATK when HP < 40%', cost:5, costType:'gem', unlocked:false, passive:true },
    { id:'vampiric', name:'Vampiric Strike', desc:'Heal 15% of damage dealt', cost:8, costType:'gem', unlocked:false, passive:true },
    { id:'doubleHit', name:'Double Strike', desc:'20% chance to hit twice', cost:10, costType:'gem', unlocked:false, passive:true },
    { id:'goldRush', name:'Gold Rush', desc:'+50% gold from kills', cost:6, costType:'gem', unlocked:false, passive:true },
    { id:'multiWave', name:'Wave Mastery', desc:'Start each wave with +10% bonus stats', cost:12, costType:'gem', unlocked:false, passive:true },
  ],

  goldMult: 1,
  regen: 0,
  waveBonus: 1,

  enemies: [],
  currentEnemies: [],
  battleTimer: 0,
  enemyAttackTimer: 0,
  attackInterval: 1000,
  waveTransition: false,
  waveTransitionTimer: 0,

  classes: ['WANDERER','KNIGHT','WARLORD','CHAMPION','LEGEND','MYTHIC','DIVINE'],
};

// Extra stats not in hero
G.goldMult = 1;
G.regen = 0;
G.waveBonus = 1;
G.hero.regen = 0;
G.hero.goldMult = 1;

// ===== ENEMY TEMPLATES =====
const ENEMY_TYPES = [
  { name:'Forest Slime', type:'slime', hpMult:1, atkMult:1, defMult:0.5, goldMult:1, expMult:1, gem:false },
  { name:'Stone Golem', type:'orc', hpMult:2.5, atkMult:1.1, defMult:2, goldMult:2, expMult:2, gem:false },
  { name:'Shadow Wolf', type:'slime', hpMult:1.5, atkMult:1.3, defMult:0.8, goldMult:1.5, expMult:1.5, gem:false },
  { name:'Iron Orc', type:'orc', hpMult:3, atkMult:1.5, defMult:2.5, goldMult:3, expMult:2.5, gem:false },
  { name:'Fire Drake', type:'dragon', hpMult:4, atkMult:1.7, defMult:2, goldMult:4, expMult:3, gem:true },
  { name:'Chaos Knight', type:'orc', hpMult:5, atkMult:2.5, defMult:3, goldMult:5, expMult:4, gem:false },
  { name:'Void Wraith', type:'slime', hpMult:3, atkMult:3, defMult:1.5, goldMult:6, expMult:5, gem:true },
  { name:'Ancient Dragon', type:'dragon', hpMult:5, atkMult:4, defMult:3, goldMult:8, expMult:6, gem:true },
  { name:'Demon Lord', type:'dragon', hpMult:8, atkMult:4.5, defMult:4, goldMult:15, expMult:8, gem:true },
  { name:'OMEGA BEAST', type:'dragon', hpMult:10, atkMult:6, defMult:5, goldMult:30, expMult:12, gem:true },
];

// ===== WAVE SETUP =====
function getWaveEnemy() {
  const wave = G.wave;
  const typeIdx = Math.min(Math.floor((wave - 1) / 3), ENEMY_TYPES.length - 1);
  const tmpl = ENEMY_TYPES[typeIdx];
  const scale = 1 + (wave - 1) * 0.4;
  const count = Math.min(3 + Math.floor(wave / 3), 5);
  const presBonus = 1 + G.prestigeCount * 0.1;
  return {
    template: tmpl, count,
    hp: Math.floor(30 * scale * tmpl.hpMult * presBonus),
    atk: Math.floor(5 * scale * tmpl.atkMult * presBonus),
    def: Math.floor(2 * scale * tmpl.defMult * presBonus),
    gold: Math.floor(10 * scale * tmpl.goldMult * G.goldMult),
    exp: Math.floor(20 * scale * tmpl.expMult),
    gem: tmpl.gem && wave % 5 === 0,
  };
}

function setupWave() {
  const info = getWaveEnemy();
  G.currentEnemies = [];
  for (let i = 0; i < info.count; i++) {
    G.currentEnemies.push({
      id: i, name: info.template.name,
      type: info.template.type,
      hp: info.hp, maxHp: info.hp,
      atk: info.atk, def: info.def,
      gold: info.gold, exp: info.exp,
      gem: info.gem,
      alive: true,
      takingHit: false,
    });
  }
  renderArena();
  updateWaveInfo();
  addLog(`wave`, `[WAVE ${G.wave}] ${info.count}x ${info.template.name} appears!`);
}

// ===== RENDERING =====
function renderArena() {
  const container = document.getElementById('battle-entities');
  container.innerHTML = '';

  G.currentEnemies.forEach((enemy, idx) => {
    if (!enemy.alive) return;

    const el = document.createElement('div');
    el.className = 'pixel-enemy';
    el.id = `enemy-${idx}`;
    el.style.position = 'relative';

    const pct = (enemy.hp / enemy.maxHp) * 100;

    el.innerHTML = `
      <div class="enemy-hp-bar">
        <div class="enemy-hp-label">${enemy.name}</div>
        <div class="enemy-hp-track">
          <div class="enemy-hp-fill" id="ehp-${idx}" style="width:${pct}%"></div>
        </div>
      </div>
      ${getEnemyHTML(enemy.type)}
    `;
    container.appendChild(el);
  });
}

function getEnemyHTML(type) {
  if (type === 'slime') {
    return `<div class="slime-body"></div>`;
  } else if (type === 'orc') {
    return `<div class="orc-head"></div><div class="orc-body"></div>`;
  } else {
    return `<div class="dragon-head"></div><div class="dragon-body"></div>`;
  }
}

function updateHeroVisuals() {
  const h = G.hero;
  document.getElementById('hp-text').textContent = `${Math.max(0,Math.floor(h.hp))}/${Math.floor(h.maxHp)}`;
  document.getElementById('mp-text').textContent = `${Math.floor(h.mp)}/${Math.floor(h.maxMp)}`;
  document.getElementById('exp-text').textContent = `${Math.floor(h.exp)}/${Math.floor(h.expNeeded)}`;
  document.getElementById('hp-bar').style.width = `${Math.max(0,(h.hp/h.maxHp)*100)}%`;
  document.getElementById('mp-bar').style.width = `${(h.mp/h.maxMp)*100}%`;
  document.getElementById('exp-bar').style.width = `${Math.min(100,(h.exp/h.expNeeded)*100)}%`;
  document.getElementById('stat-atk').textContent = Math.floor(h.atk);
  document.getElementById('stat-def').textContent = Math.floor(h.def);
  document.getElementById('stat-spd').textContent = h.speed.toFixed(1);
  document.getElementById('stat-crit').textContent = Math.floor(h.crit) + '%';
  document.getElementById('hero-level').textContent = `LV.${h.level}`;
  document.getElementById('hero-name').textContent = h.name;
  document.getElementById('hero-class').textContent = G.classes[Math.min(Math.floor((h.level-1)/10), G.classes.length-1)];
}

function updateWaveInfo() {
  const alive = G.currentEnemies.filter(e=>e.alive).length;
  const total = G.currentEnemies.length;
  document.getElementById('wave-title').textContent = `Wave ${G.wave} - ${G.currentEnemies[0]?.name || ''}`;
  document.getElementById('enemy-count').textContent = `Enemies: ${alive}/${total}`;
  document.getElementById('wave-display').textContent = G.wave;
}

function updateResources() {
  document.getElementById('gold-display').textContent = formatNum(G.gold);
  document.getElementById('gem-display').textContent = G.gems;
  document.getElementById('prestige-display').textContent = G.prestigeCount;
}

function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}

// ===== BATTLE LOGIC =====
let lastTime = 0;
let heroAttackAccum = 0;
let enemyAttackAccum = 0;
let regenAccum = 0;
let paused = false;

function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  const rawDt = ts - lastTime;
  lastTime = ts;
  const dt = rawDt * G.gameSpeed;

  if (!paused) {
    if (!G.hero.alive) {
      heroRespawn(dt);
    } else if (G.waveTransition) {
      G.waveTransitionTimer -= dt;
      if (G.waveTransitionTimer <= 0) {
        G.waveTransition = false;
        G.wave++;
        setupWave();
      }
    } else {
      // Regen
      regenAccum += dt;
      if (regenAccum >= 1000) {
        regenAccum -= 1000;
        if (G.hero.regen > 0 && G.hero.hp < G.hero.maxHp) {
          G.hero.hp = Math.min(G.hero.maxHp, G.hero.hp + G.hero.regen);
          updateHeroVisuals();
        }
        // Also regen MP slowly
        if (G.hero.mp < G.hero.maxMp) {
          G.hero.mp = Math.min(G.hero.maxMp, G.hero.mp + G.hero.maxMp * 0.02);
          updateHeroVisuals();
        }
      }

      const interval = 1000 / G.hero.speed;
      heroAttackAccum += dt;
      if (heroAttackAccum >= interval) {
        heroAttackAccum = 0;
        heroAttacks();
      }

      enemyAttackAccum += dt;
      if (enemyAttackAccum >= 1800) {
        enemyAttackAccum = 0;
        enemiesAttack();
      }
    }
  }

  requestAnimationFrame(gameLoop);
}

function heroAttacks() {
  const alive = G.currentEnemies.filter(e => e.alive);
  if (!alive.length) return;

  const target = alive[0];
  let dmg = Math.max(1, G.hero.atk - target.def * 0.5);
  let isCrit = Math.random() * 100 < G.hero.crit;

  // Berserker
  if (G.skills.find(s=>s.id==='berserker')?.unlocked && G.hero.hp < G.hero.maxHp * 0.4) {
    dmg *= 1.3;
  }

  // Double Strike
  let hits = 1;
  if (G.skills.find(s=>s.id==='doubleHit')?.unlocked && Math.random() < 0.2) {
    hits = 2;
  }

  for (let h = 0; h < hits; h++) {
    let finalDmg = Math.floor(dmg * (0.85 + Math.random() * 0.3));
    if (isCrit) finalDmg = Math.floor(finalDmg * 2.2);
    finalDmg = Math.max(1, finalDmg);

    target.hp = Math.max(0, target.hp - finalDmg);
    showDmgNum(finalDmg, isCrit, false, target.id);

    // Vampiric
    if (G.skills.find(s=>s.id==='vampiric')?.unlocked) {
      const healAmt = Math.floor(finalDmg * 0.15);
      G.hero.hp = Math.min(G.hero.maxHp, G.hero.hp + healAmt);
    }

    // Animate hero
    const heroEl = document.getElementById('pixel-hero');
    if (heroEl) {
      heroEl.classList.add('attacking');
      setTimeout(() => heroEl.classList.remove('attacking'), 400);
    }

    // Animate enemy taking hit
    const enemyEl = document.getElementById(`enemy-${target.id}`);
    if (enemyEl) {
      enemyEl.classList.add('taking-hit');
      setTimeout(() => enemyEl.classList.remove('taking-hit'), 350);
    }

    // Update HP bar
    const fillEl = document.getElementById(`ehp-${target.id}`);
    if (fillEl) fillEl.style.width = `${(target.hp / target.maxHp) * 100}%`;

    if (isCrit) addLog('crit', `[CRIT!] Hero strikes ${target.name} for ${finalDmg}!`);
    else addLog('attack', `Hero attacks ${target.name} for ${finalDmg} DMG.`);

    if (target.hp <= 0) {
      killEnemy(target);
      break;
    }
  }

  updateHeroVisuals();
}

function killEnemy(enemy) {
  enemy.alive = false;

  const enemyEl = document.getElementById(`enemy-${enemy.id}`);
  if (enemyEl) {
    enemyEl.classList.add('dead');
    setTimeout(() => enemyEl.remove(), 500);
    spawnParticles(enemyEl);
  }

  // Gold
  const goldGain = Math.floor(enemy.gold * G.goldMult * (G.skills.find(s=>s.id==='goldRush')?.unlocked ? 1.5 : 1));
  G.gold += goldGain;

  // Gems
  if (enemy.gem && Math.random() < 0.5) {
    G.gems++;
    showNotif(`+1 GEM!`);
  }

  // EXP
  G.hero.exp += enemy.exp;
  checkLevelUp();

  addLog('kill', `${enemy.name} defeated! +${goldGain} Gold`);
  updateWaveInfo();
  updateResources();
  renderUpgrades();

  // Check all dead
  const aliveCount = G.currentEnemies.filter(e => e.alive).length;
  if (aliveCount === 0) {
    addLog('wave', `[WAVE ${G.wave} CLEARED!] Next wave in 3s...`);
    showNotif(`Wave ${G.wave} Cleared!`);
    G.gems += Math.floor(G.wave / 5);
    G.waveTransition = true;
    G.waveTransitionTimer = 3000;
    updateResources();
  }
}

function enemiesAttack() {
  const alive = G.currentEnemies.filter(e => e.alive);
  if (!alive.length || !G.hero.alive) return;

  alive.forEach(enemy => {
    const dmg = Math.max(1, enemy.atk - G.hero.def * 0.4);
    const finalDmg = Math.floor(dmg * (0.85 + Math.random() * 0.3));
    G.hero.hp = Math.max(0, G.hero.hp - finalDmg);

    showDmgNum(finalDmg, false, true, 0);
    addLog('', `${enemy.name} attacks Hero for ${finalDmg} DMG.`);

    if (G.hero.hp <= 0) {
      heroDies();
    }
  });

  updateHeroVisuals();
}

function heroDies() {
  G.hero.alive = false;
  G.hero.hp = 0;
  addLog('wave', '[HERO FALLEN] Respawning in 5 seconds...');
  updateHeroVisuals();
}

function heroRespawn(dt) {
  G.hero.respawnTimer = (G.hero.respawnTimer || 5000) - dt;
  if (G.hero.respawnTimer <= 0) {
    G.hero.alive = true;
    G.hero.hp = G.hero.maxHp;
    G.hero.mp = G.hero.maxMp;
    G.hero.respawnTimer = 0;
    addLog('heal', '[HERO REBORN] Ready for battle!');
    updateHeroVisuals();
    setupWave();
  }
}

function checkLevelUp() {
  while (G.hero.exp >= G.hero.expNeeded) {
    G.hero.exp -= G.hero.expNeeded;
    G.hero.level++;
    G.hero.expNeeded = Math.floor(100 * Math.pow(1.35, G.hero.level - 1));

    // Base stats grow with level
    G.hero.atk += 2;
    G.hero.def += 1;
    G.hero.maxHp += 20;
    G.hero.hp = G.hero.maxHp;

    addLog('level', `[LEVEL UP!] Hero reached LV.${G.hero.level}!`);
    showNotif(`Level Up! LV.${G.hero.level}`);
    updateHeroVisuals();
  }
  updateHeroVisuals();
}

// ===== DAMAGE NUMBERS =====
function showDmgNum(dmg, isCrit, isEnemyHit, enemyId) {
  const arena = document.getElementById('battle-arena');
  const el = document.createElement('div');
  el.className = 'dmg-num' + (isCrit ? ' crit' : '') + (isEnemyHit ? ' enemy-dmg' : '');
  el.textContent = (isEnemyHit ? '-' : '') + dmg;
  el.style.left = (isEnemyHit ? '20%' : (50 + (enemyId - 1) * 25)) + '%';
  el.style.bottom = '100px';
  arena.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function spawnParticles(el) {
  const arena = document.getElementById('battle-arena');
  const rect = el.getBoundingClientRect();
  const arenaRect = arena.getBoundingClientRect();
  const cx = rect.left - arenaRect.left + rect.width / 2;
  const cy = rect.top - arenaRect.top + rect.height / 2;

  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / 8;
    const dist = 30 + Math.random() * 30;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      width:6px; height:6px;
      background:${['#f0c040','#f87171','#c084fc','#4ade80'][Math.floor(Math.random()*4)]};
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      z-index:200;
    `;
    arena.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

// ===== BATTLE LOG =====
const logEl = document.getElementById('battle-log');
let logLines = 0;
function addLog(cls, msg) {
  const div = document.createElement('div');
  div.className = 'log-entry' + (cls ? ` ${cls}` : '');
  div.textContent = msg;
  logEl.appendChild(div);
  logLines++;
  if (logLines > 60) { logEl.firstChild?.remove(); logLines--; }
  logEl.scrollTop = logEl.scrollHeight;
}

// ===== UPGRADES =====
function renderUpgrades() {
  renderStatUpgrades();
  renderSkills();
  renderPrestige();
}

function getUpgradeStat(up) {
  const baseVal = up.extra ? (up.stat === 'goldMult' ? G.goldMult : G.regen) : G.hero[up.stat];
  return baseVal;
}

function renderStatUpgrades() {
  const container = document.getElementById('tab-stats');
  container.innerHTML = '';

  G.upgrades.forEach(up => {
    const cost = Math.floor(up.cost * Math.pow(up.costMult, up.level));
    const canAfford = G.gold >= cost;
    const isMax = up.level >= up.max;
    const pct = (up.level / up.max) * 100;
    const curVal = up.base + up.inc * up.level;

    const card = document.createElement('div');
    card.className = 'upgrade-card' + (isMax ? ' maxed' : '');
    card.innerHTML = `
      <div class="upgrade-header">
        <div class="upgrade-icon" style="background:${up.color}22; border-color:${up.color}44;">
          ${getSVGIcon(up.icon, up.color)}
        </div>
        <div class="upgrade-name">${up.name}</div>
        <div class="upgrade-level-badge">LV ${up.level}</div>
      </div>
      <div class="upgrade-body">
        <div class="upgrade-desc">${up.desc}</div>
        <div class="upgrade-current">Current: ${formatStatVal(up, curVal)}</div>
        <div class="upgrade-progress">
          <div class="upgrade-progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${up.color}88,${up.color});"></div>
        </div>
        <button class="upgrade-btn" onclick="buyUpgrade('${up.id}')" ${isMax || !canAfford ? 'disabled' : ''}>
          ${isMax ? 'MAX LEVEL' : 'UPGRADE'}
        </button>
        ${!isMax ? `<div class="upgrade-cost">${formatNum(cost)} Gold</div>` : ''}
      </div>
    `;
    container.appendChild(card);
  });
}

function formatStatVal(up, val) {
  if (up.id === 'spd') return val.toFixed(2) + ' atk/s';
  if (up.id === 'crit') return Math.floor(val) + '%';
  if (up.id === 'gold') return 'x' + val.toFixed(1);
  if (up.id === 'regen') return Math.floor(val) + ' HP/s';
  return Math.floor(val);
}

function buyUpgrade(id) {
  const up = G.upgrades.find(u => u.id === id);
  if (!up || up.level >= up.max) return;

  const cost = Math.floor(up.cost * Math.pow(up.costMult, up.level));
  if (G.gold < cost) { showNotif('Not enough Gold!'); return; }

  G.gold -= cost;
  up.level++;

  const newVal = up.base + up.inc * up.level;

  if (up.extra) {
    if (up.stat === 'goldMult') G.goldMult = newVal;
    else if (up.stat === 'regen') G.hero.regen = newVal;
  } else {
    G.hero[up.stat] = newVal;
  }

  // Keep HP valid
  if (up.stat === 'maxHp' && G.hero.hp > G.hero.maxHp) G.hero.hp = G.hero.maxHp;
  if (up.stat === 'maxMp' && G.hero.mp > G.hero.maxMp) G.hero.mp = G.hero.maxMp;

  addLog('heal', `[UPGRADE] ${up.name} -> LV.${up.level}!`);
  updateHeroVisuals();
  updateResources();
  renderUpgrades();
}

function renderSkills() {
  const container = document.getElementById('tab-skills');
  container.innerHTML = '';

  G.skills.forEach(skill => {
    const card = document.createElement('div');
    card.className = 'skill-card' + (skill.unlocked ? ' unlocked' : '');
    const canAfford = G.gems >= skill.cost;
    card.innerHTML = `
      <div class="skill-icon" style="background:${skill.unlocked ? 'rgba(124,58,237,0.3)' : 'rgba(255,255,255,0.05)'}; border-color:${skill.unlocked ? '#7c3aed' : 'var(--border)'}">
        ${skill.unlocked ? getSVGIcon('check','#4ade80') : getSVGIcon('lock','#9b89c4')}
      </div>
      <div class="skill-info">
        <div class="skill-name">${skill.name}</div>
        <div class="skill-desc">${skill.desc}</div>
        ${skill.unlocked
          ? '<div class="skill-cost" style="color:#4ade80;">UNLOCKED</div>'
          : `<div class="skill-cost">${skill.cost} Gems</div>`
        }
      </div>
      ${!skill.unlocked ? `<button onclick="buySkill('${skill.id}')" class="upgrade-btn" style="width:auto;padding:6px 10px;font-size:8px;" ${canAfford?'':' disabled'}>${canAfford?'UNLOCK':'NEED '+skill.cost+' GEM'}</button>` : ''}
    `;
    container.appendChild(card);
  });
}

function buySkill(id) {
  const skill = G.skills.find(s => s.id === id);
  if (!skill || skill.unlocked) return;
  if (G.gems < skill.cost) { showNotif('Not enough Gems!'); return; }
  G.gems -= skill.cost;
  skill.unlocked = true;
  addLog('level', `[SKILL] ${skill.name} unlocked!`);
  showNotif(`${skill.name} Unlocked!`);
  updateResources();
  renderUpgrades();
}

function renderPrestige() {
  const container = document.getElementById('tab-prestige');
  container.innerHTML = '';

  const reqWave = 10 + G.prestigeCount * 5;
  const canPrestige = G.wave >= reqWave;

  const p = document.createElement('div');
  p.className = 'prestige-panel';
  p.innerHTML = `
    <div class="prestige-title">PRESTIGE</div>
    <div class="prestige-desc">
      Reset your progress and gain a permanent power bonus. All stats and upgrades reset, but you keep Gems.
    </div>
    <div class="prestige-bonus">
      Current Bonus: +${(G.prestigeCount * 30)}% All Stats<br><br>
      Next Bonus: +${((G.prestigeCount+1) * 30)}% All Stats<br><br>
      Required: Wave ${reqWave}
    </div>
    <button class="prestige-btn" onclick="doPrestige()" ${canPrestige ? '' : 'disabled'}>
      ${canPrestige ? 'PRESTIGE NOW' : 'Reach Wave ' + reqWave}
    </button>
  `;
  container.appendChild(p);

  if (G.prestigeCount > 0) {
    const info = document.createElement('div');
    info.style.padding = '10px 14px';
    info.innerHTML = `
      <div style="font-family:'Press Start 2P',monospace;font-size:8px;color:#60a5fa;margin-bottom:6px;">PRESTIGE HISTORY</div>
      <div style="font-size:12px;color:var(--text-dim);">
        Prestige count: <strong style="color:var(--gold);">${G.prestigeCount}</strong><br>
        Permanent stat bonus: <strong style="color:#60a5fa;">+${G.prestigeCount * 30}%</strong>
      </div>
    `;
    container.appendChild(info);
  }
}

function doPrestige() {
  const reqWave = 10 + G.prestigeCount * 5;
  if (G.wave < reqWave) return;

  G.prestigeCount++;
  G.prestigeBonus = 1 + G.prestigeCount * 0.30;

  // Reset
  G.gold = 0;
  G.wave = 1;
  G.goldMult = 1;

  // Reset upgrades
  G.upgrades.forEach(up => { up.level = 0; });
  G.skills.forEach(s => { s.unlocked = false; });

  // Reset hero with prestige bonus
  G.hero = {
    name: 'AETHER', level: 1,
    hp: Math.floor(100 * G.prestigeBonus),
    maxHp: Math.floor(100 * G.prestigeBonus),
    mp: 50, maxMp: 50,
    atk: Math.floor(10 * G.prestigeBonus),
    def: Math.floor(5 * G.prestigeBonus),
    speed: 1.0, crit: 5,
    exp: 0, expNeeded: 100,
    alive: true, respawnTimer: 0,
    regen: 0, goldMult: 1,
  };

  G.upgrades.forEach(up => {
    up.level = 0; // Reset level upgrade ke 0
    
    // Kalikan base awal dengan prestige bonus
    // Atk: 10 * 1.3 = 13. Sekarang base upgrade-nya adalah 13.
    if (up.id === 'atk') up.base = Math.floor(10 * G.prestigeBonus);
    if (up.id === 'def') up.base = Math.floor(5 * G.prestigeBonus);
    if (up.id === 'hp')  up.base = Math.floor(100 * G.prestigeBonus);
    // Tambahkan untuk stat lain jika ingin base-nya ikut naik
  });

  setupWave();
  updateHeroVisuals();
  updateResources();
  renderUpgrades();
  addLog('level', `[PRESTIGE ${G.prestigeCount}] Power reborn! Bonus: +${G.prestigeCount*10}%`);
  showNotif(`Prestige ${G.prestigeCount}! +${G.prestigeCount*30}% Stats`);
}

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['stats','skills','prestige'][i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach((c) => {
    c.classList.remove('active');
  });
  document.getElementById(`tab-${tab}`).classList.add('active');
}

// ===== SPEED =====
function setSpeed(s) {
  G.gameSpeed = s;
  document.getElementById('speed-1x').classList.toggle('active', s===1);
  document.getElementById('speed-2x').classList.toggle('active', s===2);
  document.getElementById('speed-4x').classList.toggle('active', s===4);
}

// ===== NOTIFICATION =====
let notifTimer = null;
function showNotif(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== SVG ICONS =====
function getSVGIcon(name, color='currentColor') {
  const icons = {
    sword: `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><path d="M14.5 17.5L3 6V3h3l11.5 11.5"/><path d="M13 19l6-6"/><path d="M2 2l20 20"/></svg>`,
    shield: `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
    heart: `<svg viewBox="0 0 24 24" fill="${color}" stroke="${color}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
    droplet: `<svg viewBox="0 0 24 24" fill="${color}" stroke="${color}" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>`,
    zap: `<svg viewBox="0 0 24 24" fill="${color}" stroke="${color}" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
    target: `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
    coins: `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>`,
    plus: `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
    check: `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`,
    lock: `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
  };
  return icons[name] || icons['sword'];
}

// ===== INIT =====
function init() {
  setupWave();
  updateHeroVisuals();
  updateResources();
  renderUpgrades();
  requestAnimationFrame(gameLoop);
}

init();
</script>
